name: PE Funds SEC Scraper Pipeline

on:
  schedule:
    - cron: '0 12 * * 5' # 毎週金曜日の日本時間21:00
  workflow_dispatch: # 手動実行ボタン

# 🚀 2026年6月のNode.js 24強制移行に対応するためのグローバル環境変数
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  scrape_and_update:
    runs-on: ubuntu-latest

    steps:
    # 1. コードのチェックアウト
    - name: Checkout repository code
      uses: actions/checkout@v4 # もし今後@v5等が出れば自動でNode24対応になります

    # 2. Python環境のセットアップ
    - name: Set up Python
      uses: actions/setup-python@v5

    # 3. 必要な外部ライブラリの一括インストール（beautifulsoup4、google-genaiを追加）
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests google-auth gspread pandas beautifulsoup4 google-genai

    # 4. スクリプトの実行（環境変数と鍵の注入）
    - name: Run Scraper Script
      env:
        GCP_SERVICE_ACCOUNT_KEY: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }} # 👈 Geminiの鍵もここでLinuxに渡します
      run: |
        python main.py
