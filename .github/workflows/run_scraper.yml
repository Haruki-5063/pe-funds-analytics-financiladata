name: PE Funds SEC Scraper Pipeline

on:
  schedule:
    - cron: '0 12 * * 5' # 毎週金曜日の日本時間21:00
  workflow_dispatch: # 手動実行ボタン

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  scrape_and_update:
    runs-on: ubuntu-latest

    steps:
    # 1. コードのチェックアウト
    - name: Checkout repository code
      uses: actions/checkout@v4

    # 2. Python環境のセットアップ（バージョンを指定して2つ目の警告を消去）
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10' # 👈 ここを追加しました

    # 3. 必要な外部ライブラリの一括インストール
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests google-auth gspread pandas beautifulsoup4 google-genai

    # 4. スクリプトの実行（環境変数と鍵の注入）
    - name: Run Scraper Script
      env:
        GCP_SERVICE_ACCOUNT_KEY: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: |
        python main.py
