name: PE Funds SEC Scraper Pipeline

# ⏰ トリガーの定義（定期実行）
on:
  schedule:
    # 毎週金曜日のUTC 12:00（日本時間の金曜21:00）に自動起動
    - cron: '0 12 * * 5'
  # 💡 GitHubの画面から「手動で今すぐ実行」ボタンも出せるようにする設定
  workflow_dispatch:

jobs:
  scrape_and_update:
    runs-on: ubuntu-latest # 最新のLinux環境をクラウド上に1台用意

    steps:
    # 1. GitHub上にあるあなたのPythonコードをLinuxマシンにコピー
    - name: Checkout repository code
      uses: actions/checkout@v4

    # 2. Python環境（バージョン3.10）のセットアップ
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    # 3. 実行に必要な外部ライブラリ（Pandasやgspread）の一括インストール
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests google-auth gspread pandas

    # 4. スクリプトの実行（隠し金庫の鍵を一時的にLinuxに引き渡す）
    - name: Run Scraper Script
      env:
        GCP_SERVICE_ACCOUNT_KEY: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}
      run: |
        python main.py
